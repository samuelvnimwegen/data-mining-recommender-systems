name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pandas numpy scikit-learn

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint check
        run: ruff check .

      - name: Run tests
        run: pytest -q

